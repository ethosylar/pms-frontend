<div
class="d-flex"
id="wrapper"
[class.sidebar-collapsed]="sidebarCollapsed">
	
	<!-- Sidebar -->
	<aside class="border-end bg-dark text-white sidebar">
		
		<div
		class="sidebar-header px-3 py-3"
		(click)="toggleSidebar()"
		role="button"
		tabindex="0"
		aria-label="Toggle sidebar">
			
			<div class="brand">
				<div class="fw-bold">HPMS</div>
				<div class="small text-white-50">
					Hospital Project Management
				</div>
			</div>
			
			<i class="bi bi-list text-white-50 sidebar-toggle-icon"></i>
		</div>
		
		<div class="list-group list-group-flush">
			
			<!-- Main menu -->
			<ng-container *ngFor="let item of mainItems">
				<a
				*ngIf="canAny(item.permissions)"
				class="list-group-item list-group-item-action sidebar-link"
				[routerLink]="item.route"
				routerLinkActive="active"
				[routerLinkActiveOptions]="{ exact: item.exact === true }">
					
					<i class="bi" [ngClass]="item.icon"></i>
					<span class="link-text ms-2">{{ item.label }}</span>
				</a>
			</ng-container>
			
			<!-- Admin menu -->
			<ng-container *ngIf="showAdminSection()">
				
				<div class="sidebar-section-title">
					Admin
				</div>
				
				<!-- Access Control -->
				<ng-container *ngIf="showGroup(accessControlItems)">
					<div class="sidebar-subsection-title">
						Access Control
					</div>
					
					<ng-container *ngFor="let item of accessControlItems">
						<a
						*ngIf="canAny(item.permissions)"
						class="list-group-item list-group-item-action sidebar-link"
						[routerLink]="item.route"
						routerLinkActive="active">
							
							<i class="bi" [ngClass]="item.icon"></i>
							<span class="link-text ms-2">{{ item.label }}</span>
						</a>
					</ng-container>
				</ng-container>
				
				<!-- Master Data -->
				<ng-container *ngIf="showGroup(masterDataItems)">
					<div class="sidebar-subsection-title">
						Master Data
					</div>
					
					<ng-container *ngFor="let item of masterDataItems">
						<a
						*ngIf="canAny(item.permissions)"
						class="list-group-item list-group-item-action sidebar-link"
						[routerLink]="item.route"
						routerLinkActive="active">
							
							<i class="bi" [ngClass]="item.icon"></i>
							<span class="link-text ms-2">{{ item.label }}</span>
						</a>
					</ng-container>
				</ng-container>
				
			</ng-container>
			
		</div>
	</aside>
	
	<!-- Page content wrapper -->
	<div id="page-content-wrapper" class="flex-grow-1">
		
		<!-- Top navbar -->
		<nav class="navbar navbar-expand navbar-light bg-white border-bottom px-3">
			<div class="navbar-brand fw-bold">
				{{ currentPageTitle() }}
			</div>
			
			<div class="ms-auto d-flex align-items-center gap-3">
				<div class="text-end">
					<div class="small fw-semibold">
						{{ (user$ | async)?.name ?? 'User' }}
					</div>
					
					<div class="text-muted small">
						{{ (user$ | async)?.email ?? '' }}
					</div>
				</div>
				
				<button
				class="btn btn-outline-danger btn-sm"
				(click)="logout()">
					Logout
				</button>
			</div>
		</nav>
		
		<!-- Page content -->
		<main class="container-fluid py-4">
			<router-outlet></router-outlet>
		</main>
		
		<app-toast-container></app-toast-container>
	</div>
</div>
