<div class="position-relative">
	
	<div *ngIf="loading" class="loading-overlay">
		<div class="text-center">
			<div class="spinner-border" role="status"></div>
			<div class="mt-2 fw-semibold">Loading…</div>
		</div>
	</div>
	
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div>
			<h1 class="h4 mb-0">{{ isCreate ? 'New Task' : 'Edit Task' }}</h1>
			<div class="text-muted small">Project #{{ projectId }}</div>
		</div>
		
		<div class="d-flex gap-2">
			<button class="btn btn-outline-secondary" (click)="cancel()">
				<i class="bi bi-x-lg"></i><span class="ms-2">Cancel</span>
			</button>
			<button class="btn btn-primary" [disabled]="saving" (click)="save()">
				<span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
				Save
			</button>
		</div>
	</div>
	
	<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
	
	<div class="card shadow-sm border-0">
		<div class="card-body">
			<form [formGroup]="form" class="row g-3">
				
				<div class="col-12">
					<label class="form-label">Name *</label>
					<input class="form-control" formControlName="name" />
					<div class="text-danger small mt-1" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
						Name is required.
					</div>
				</div>
				
				<div class="col-12 col-md-4">
					<label class="form-label">Status</label>
					<select class="form-select" formControlName="task_status_id">
						<option [ngValue]="null">—</option>
						<option *ngFor="let s of statuses" [ngValue]="s.id">
							{{ s.code }} - {{ s.name }}
						</option>
					</select>
				</div>
				
				<div class="col-12 col-md-4">
					<label class="form-label">Assignee</label>
					<select class="form-select" formControlName="assigned_to_user_id">
						<option [ngValue]="null">—</option>
						<option *ngFor="let u of users" [ngValue]="u.id">{{ u.name }}</option>
					</select>
				</div>
				
				<div class="col-12 col-md-4">
					<label class="form-label">Progress (%)</label>
					<input class="form-control" type="number" min="0" max="100" formControlName="progress" />
				</div>
				
				<div class="col-12 col-md-3">
					<label class="form-label">Start Date</label>
					<input class="form-control" type="date" formControlName="start_date" />
				</div>
				
				<div class="col-12 col-md-3">
					<label class="form-label">End Date</label>
					<input class="form-control" type="date" formControlName="end_date" />
				</div>
				
				<div class="col-12 col-md-3">
					<label class="form-label">Sort Order</label>
					<input class="form-control" type="number" formControlName="sort_order" />
				</div>
				
				<div class="col-12 col-md-3">
					<label class="form-label">Parent Task</label>
					<select class="form-select" formControlName="parent_task_id">
						<option [ngValue]="null">—</option>
						<option *ngFor="let t of taskOptions" [ngValue]="t.id">
							#{{ t.id }} - {{ t.name }}
						</option>
					</select>
				</div>
				
				<div class="col-12 col-md-6">
					<label class="form-label">Depends On</label>
					<select class="form-select" formControlName="depends_on_task_id">
						<option [ngValue]="null">—</option>
						<option *ngFor="let t of taskOptions" [ngValue]="t.id">
							#{{ t.id }} - {{ t.name }}
						</option>
					</select>
				</div>
				
				<div class="col-12 col-md-6">
					<label class="form-label">Milestone (optional)</label>
					<select class="form-select" formControlName="milestone_id">
						<option [ngValue]="null">— None —</option>
						<option *ngFor="let m of milestones" [ngValue]="m.id">
							{{ m.name }} {{ m.milestone_date ? ('• ' + (m.milestone_date | date:'yyyy-MM-dd')) : '' }}
						</option>
					</select>
				</div>
				
			</form>
		</div>
	</div>
	
</div>
