<div class="position-relative">
	
	<div *ngIf="loading" class="loading-overlay">
		<div class="text-center">
			<div class="spinner-border" role="status"></div>
			<div class="mt-2 fw-semibold">Loading…</div>
		</div>
	</div>
	
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div>
			<h1 class="h4 mb-0">Project Milestones</h1>
			<div class="text-muted small" *ngIf="project">
				{{ project.code }} • {{ project.name }}
			</div>
		</div>
		
		<div class="d-flex gap-2">
			<button class="btn btn-outline-secondary" (click)="backToProject()">
				<i class="bi bi-arrow-left"></i><span class="ms-2">Back</span>
			</button>
			<button class="btn btn-primary" (click)="create()">
				<i class="bi bi-plus-lg"></i><span class="ms-2">New</span>
			</button>
		</div>
	</div>
	
	<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
	
	<div class="card shadow-sm border-0 mb-3">
		<div class="card-body">
			<form [formGroup]="form" class="row g-2 align-items-end">
				<div class="col-12 col-md-4">
					<label class="form-label small text-muted">Search</label>
					<input class="form-control" formControlName="search" placeholder="Name contains…" />
				</div>
				
				<div class="col-12 col-md-2">
					<label class="form-label small text-muted">Status</label>
					<select class="form-select" formControlName="status">
						<option value="">All</option>
						<option value="PENDING">PENDING</option>
						<option value="DONE">DONE</option>
						<option value="CANCELLED">CANCELLED</option>
					</select>
				</div>
				
				<div class="col-12 col-md-2">
					<label class="form-label small text-muted">From</label>
					<input type="date" class="form-control" formControlName="date_from" />
				</div>
				
				<div class="col-12 col-md-2">
					<label class="form-label small text-muted">To</label>
					<input type="date" class="form-control" formControlName="date_to" />
				</div>
				
				<div class="col-12 col-md-2 d-flex gap-2">
					<button type="button" class="btn btn-outline-primary w-100" (click)="apply()">Apply</button>
					<button type="button" class="btn btn-outline-secondary w-100" (click)="clear()">Clear</button>
				</div>
			</form>
		</div>
	</div>
	
	<div class="card shadow-sm border-0">
		<div class="table-responsive">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
					<tr>
						<th style="width: 45%">Name</th>
						<th style="width: 20%">Date</th>
						<th style="width: 15%">Status</th>
						<th style="width: 20%" class="text-end">Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr *ngFor="let r of rows">
						<td class="fw-semibold">{{ r.name }}</td>
						<td>{{ r.milestone_date ? (r.milestone_date | date:'yyyy-MM-dd') : '—' }}</td>
						<td>
							<span class="badge" [ngClass]="badgeClass(r.status)">{{ r.status }}</span>
						</td>
						<td class="text-end">
							<button class="btn btn-sm btn-outline-primary me-2" (click)="edit(r)">
								<i class="bi bi-pencil"></i>
							</button>
							<button class="btn btn-sm btn-outline-danger" (click)="remove(r)">
								<i class="bi bi-trash"></i>
							</button>
						</td>
					</tr>
					
					<tr *ngIf="!rows && !loading">
						<td colspan="4" class="text-center text-muted py-4">No milestones found.</td>
					</tr>
				</tbody>
			</table>
		</div>
		
		<div class="card-body d-flex align-items-center justify-content-between">
			<div class="text-muted small">
				Total: {{ meta.total }}
			</div>
			
			<div class="d-flex gap-2">
				<button class="btn btn-outline-secondary btn-sm"
                [disabled]="meta.current_page <= 1"
                (click)="load(meta.current_page - 1)">
					Prev
				</button>
				<button class="btn btn-outline-secondary btn-sm"
                [disabled]="meta.current_page >= meta.last_page"
                (click)="load(meta.current_page + 1)">
					Next
				</button>
			</div>
		</div>
	</div>
	
</div>
