<div class="position-relative">
	
	<div *ngIf="loading" class="loading-overlay">
		<div class="text-center">
			<div class="spinner-border" role="status"></div>
			<div class="mt-2 fw-semibold">Loading…</div>
		</div>
	</div>
	
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div>
			<h1 class="h4 mb-0">{{ isCreate ? 'New Milestone' : 'Edit Milestone' }}</h1>
			<div class="text-muted small" *ngIf="project">
				{{ project.code }} • {{ project.name }}
			</div>
		</div>
		
		<button class="btn btn-outline-secondary" (click)="cancel()">
			<i class="bi bi-x-lg"></i><span class="ms-2">Cancel</span>
		</button>
	</div>
	
	<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
	
	<div class="card shadow-sm border-0">
		<div class="card-body">
			<form [formGroup]="form" class="row g-3">
				
				<div class="col-12">
					<label class="form-label">Name</label>
					<input class="form-control" formControlName="name" />
					<div class="text-danger small mt-1" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
						Name is required.
					</div>
				</div>
				
				<div class="col-12 col-md-4">
					<label class="form-label">Milestone Date</label>
					<input type="date" class="form-control" formControlName="milestone_date" />
					<div class="text-danger small mt-1" *ngIf="form.get('milestone_date')?.touched && form.get('milestone_date')?.invalid">
						Date is required.
					</div>
				</div>
				
				<div class="col-12 col-md-4">
					<label class="form-label">Status</label>
					<select class="form-select" formControlName="status">
						<option value="PENDING">PENDING</option>
						<option value="DONE">DONE</option>
						<option value="CANCELLED">CANCELLED</option>
					</select>
				</div>
				
				<div class="col-12 d-flex gap-2">
					<button type="button" class="btn btn-primary" [disabled]="saving" (click)="save()">
						<span *ngIf="!saving">Save</span>
						<span *ngIf="saving">Saving…</span>
					</button>
					<button type="button" class="btn btn-outline-secondary" [disabled]="saving" (click)="cancel()">Cancel</button>
				</div>
				
			</form>
		</div>
	</div>
	
</div>
