<div class="position-relative audit-logs-wrap">
	
	<div *ngIf="loading" class="loading-overlay">
		<div class="text-center">
			<div class="spinner-border" role="status"></div>
			<div class="mt-2 fw-semibold">Loading audit logs…</div>
		</div>
	</div>
	
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div>
			<h1 class="h4 mb-0">Audit Logs</h1>
			<div class="text-muted small">Admin / Auditor</div>
		</div>
	</div>
	
	<div *ngIf="!loading && error" class="alert alert-danger">{{ error }}</div>
	
	<!-- Filters -->
	<div class="card shadow-sm border-0 mb-3">
		<div class="card-body">
			<div class="row g-2 align-items-end">
				
				<div class="col-12 col-md-4">
					<label class="form-label small text-muted">Search</label>
					<div class="input-group">
						<span class="input-group-text"><i class="bi bi-search"></i></span>
						<input class="form-control"
						placeholder="entity_type / action / source…"
						[(ngModel)]="search"
						(keydown.enter)="applyFilters()">
					</div>
				</div>
				
				<div class="col-6 col-md-2">
					<label class="form-label small text-muted">Entity Type</label>
					<input class="form-control" [(ngModel)]="entityType" placeholder="USER / USER_ROLE…">
				</div>
				
				<div class="col-6 col-md-2">
					<label class="form-label small text-muted">Action</label>
					<input class="form-control" [(ngModel)]="action" placeholder="CREATE / UPDATE…">
				</div>
				
				<div class="col-6 col-md-2">
					<label class="form-label small text-muted">From</label>
					<input type="date" class="form-control" [(ngModel)]="from">
				</div>
				
				<div class="col-6 col-md-2">
					<label class="form-label small text-muted">To</label>
					<input type="date" class="form-control" [(ngModel)]="to">
				</div>
				
				<div class="col-6 col-md-2">
					<label class="form-label small text-muted">Entity ID</label>
					<input type="number" class="form-control" [(ngModel)]="entityId">
				</div>
				
				<div class="col-6 col-md-2">
					<label class="form-label small text-muted">User ID</label>
					<input type="number" class="form-control" [(ngModel)]="userId">
				</div>
				
				<div class="col-12 col-md-3 ms-auto">
					<label class="form-label small text-muted">Per Page</label>
					<select class="form-select" [(ngModel)]="perPage" (change)="page=1; fetch()">
						<option [ngValue]="10">10</option>
						<option [ngValue]="20">20</option>
						<option [ngValue]="50">50</option>
						<option [ngValue]="100">100</option>
					</select>
				</div>
				
				<div class="col-12 d-flex gap-2 justify-content-end mt-2">
					<button class="btn btn-outline-secondary" (click)="clearFilters()">
						<i class="bi bi-x-circle"></i><span class="ms-2">Clear</span>
					</button>
					<button class="btn btn-primary" (click)="applyFilters()">
						<i class="bi bi-funnel"></i><span class="ms-2">Apply</span>
					</button>
				</div>
				
			</div>
		</div>
	</div>
	
	<!-- Table -->
	<div class="card shadow-sm border-0">
		<div class="table-responsive">
			<table class="table table-sm align-middle mb-0">
				<thead class="table-light">
					<tr>
						<th style="width:90px;">ID</th>
						<th>Performed At</th>
						<th>User</th>
						<th>Entity</th>
						<th>Action</th>
						<th>Source</th>
						<th style="width:90px;"></th>
					</tr>
				</thead>
				<tbody>
					<tr *ngFor="let r of rows">
						<td class="fw-semibold">{{ r.id }}</td>
						<td>{{ r.performed_at | date:'medium' }}</td>
						<td>{{ actorLabel(r) }}</td>
						<td>{{ entityLabel(r) }}</td>
						<td>
							<span class="badge" [ngClass]="badgeClass(r.action)">{{ r.action }}</span>
						</td>
						<td class="text-muted">{{ r.source ?? '-' }}</td>
						<td class="text-end">
							<a class="btn btn-sm btn-outline-primary"
							[routerLink]="['/audit-logs', r.id]">
								<i class="bi bi-eye"></i>
							</a>
						</td>
					</tr>
					
					<tr *ngIf="!loading && rows.length === 0">
						<td colspan="7" class="text-center text-muted py-4">No audit logs found</td>
					</tr>
				</tbody>
			</table>
		</div>
		
		<!-- Pagination -->
		<div class="d-flex align-items-center justify-content-between p-3">
			<div class="text-muted small">Total: {{ total }}</div>
			
			<div class="btn-group">
				<button class="btn btn-outline-secondary btn-sm"
                (click)="changePage(page - 1)"
                [disabled]="page <= 1">
					Prev
				</button>
				<button class="btn btn-outline-secondary btn-sm" disabled>
					Page {{ page }} / {{ lastPage }}
				</button>
				<button class="btn btn-outline-secondary btn-sm"
                (click)="changePage(page + 1)"
                [disabled]="page >= lastPage">
					Next
				</button>
			</div>
		</div>
	</div>
	
</div>
