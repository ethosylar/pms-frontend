<div class="position-relative admin-role-form-wrap">
	
	<div *ngIf="loading" class="loading-overlay">
		<div class="text-center">
			<div class="spinner-border" role="status"></div>
			<div class="mt-2 fw-semibold">Loading…</div>
		</div>
	</div>
	
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div>
			<h1 class="h4 mb-0">
				{{ isCreate ? 'Add Role' : 'Edit Role' }}
			</h1>
			<div class="text-muted small">
				Permission-based role access
			</div>
		</div>
		
		<button class="btn btn-outline-secondary" (click)="cancel()">
			<i class="bi bi-arrow-left"></i>
			<span class="ms-2">Back</span>
		</button>
	</div>
	
	<div *ngIf="error" class="alert alert-danger">
		{{ error }}
	</div>
	
	<div class="card shadow-sm border-0">
		<div class="card-body">
			<form [formGroup]="form" (ngSubmit)="save()">
				
				<div class="row g-3">
					<div class="col-12 col-md-4">
						<label class="form-label">Code</label>
						<input
						class="form-control"
						formControlName="code"
						placeholder="e.g. PMO"
						[class.is-invalid]="form.get('code')?.touched && form.get('code')?.invalid">
						
						<div class="invalid-feedback">
							Code is required.
						</div>
					</div>
					
					<div class="col-12 col-md-8">
						<label class="form-label">Name</label>
						<input
						class="form-control"
						formControlName="name"
						placeholder="e.g. PMO User"
						[class.is-invalid]="form.get('name')?.touched && form.get('name')?.invalid">
						
						<div class="invalid-feedback">
							Name is required.
						</div>
					</div>
					
					<div class="col-12">
						<div class="form-check">
							<input
							class="form-check-input"
							type="checkbox"
							formControlName="is_active"
							id="isActive">
							
							<label class="form-check-label" for="isActive">
								Active
							</label>
						</div>
					</div>
				</div>
				
				<hr class="my-4">
				
				<div class="d-flex align-items-center justify-content-between mb-3">
					<div>
						<div class="fw-semibold">Role Permissions</div>
						<div class="text-muted small">
							Select what this role is allowed to access.
						</div>
					</div>
					
					<span class="badge bg-primary">
						{{ selectedPermissionCount() }} selected
					</span>
				</div>
				
				<div *ngIf="permissionGroups.length === 0" class="alert alert-warning">
					No active permissions found. Please create permissions first.
				</div>
				
				<div class="accordion" id="permissionAccordion">
					<div
					class="accordion-item"
					*ngFor="let group of permissionGroups; let i = index">
						
						<h2 class="accordion-header">
							<button
							class="accordion-button"
							type="button"
							[class.collapsed]="!isModuleOpen(i)"
							(click)="togglePermissionModule(i)">
								
								<div class="d-flex align-items-center gap-2 w-100">
									<span>{{ group.module }}</span>
									
									<span class="badge bg-secondary">
										{{ group.permissions.length }}
									</span>
									
									<span
									class="badge bg-primary ms-auto"
									*ngIf="group.permissions.length">
										{{
										group.permissions
										.filter(p => isPermissionChecked(p.id))
										.length
										}}
										selected
									</span>
								</div>
							</button>
						</h2>
						
						<div
						class="accordion-collapse collapse"
						[class.show]="isModuleOpen(i)">
							
							<div class="accordion-body">
								<div class="form-check mb-3">
									<input
									class="form-check-input"
									type="checkbox"
									[checked]="moduleChecked(group)"
									[indeterminate]="moduleIndeterminate(group)"
									(change)="toggleModule(group, $any($event.target).checked)"
									[id]="'module_' + i">
									
									<label
									class="form-check-label fw-semibold"
									[for]="'module_' + i">
										Select all {{ group.module }} permissions
									</label>
								</div>
								
								<div class="row g-2">
									<div
									class="col-12 col-md-6 col-xl-4"
									*ngFor="let p of group.permissions">
										
										<div class="border rounded p-2 h-100">
											<div class="form-check">
												<input
												class="form-check-input"
												type="checkbox"
												[checked]="isPermissionChecked(p.id)"
												(change)="togglePermission(p.id, $any($event.target).checked)"
												[id]="'permission_' + p.id">
												
												<label
												class="form-check-label"
												[for]="'permission_' + p.id">
													
													<span class="fw-semibold">
														{{ p.code }}
													</span>
													
													<div class="text-muted small">
														{{ p.name }}
													</div>
													
													<div
													class="text-muted small"
													*ngIf="p.description">
														{{ p.description }}
													</div>
												</label>
											</div>
										</div>
										
									</div>
								</div>
							</div>
						</div>
						
					</div>
				</div>
				
				<div class="d-flex gap-2 justify-content-end mt-4">
					<button
					type="button"
					class="btn btn-outline-secondary"
					(click)="cancel()"
					[disabled]="saving">
						Cancel
					</button>
					
					<button
					type="submit"
					class="btn btn-primary"
					[disabled]="saving">
						<span *ngIf="!saving">
							{{ isCreate ? 'Create Role' : 'Save Changes' }}
						</span>
						
						<span *ngIf="saving">
							Saving…
						</span>
					</button>
				</div>
				
			</form>
		</div>
	</div>
</div>
