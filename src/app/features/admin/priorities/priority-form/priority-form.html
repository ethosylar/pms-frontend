<div class="position-relative admin-priority-form-wrap">
	
	<div *ngIf="loading" class="loading-overlay">
		<div class="text-center">
			<div class="spinner-border" role="status"></div>
			<div class="mt-2 fw-semibold">Loading…</div>
		</div>
	</div>
	
	<div class="d-flex align-items-center justify-content-between mb-3">
		<div>
			<h1 class="h4 mb-0">{{ isCreate ? 'Add Priority' : 'Edit Priority' }}</h1>
			<div class="text-muted small">Admin only</div>
		</div>
		
		<button class="btn btn-outline-secondary" (click)="cancel()">
			<i class="bi bi-arrow-left"></i><span class="ms-2">Back</span>
		</button>
	</div>
	
	<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
	
	<div class="card shadow-sm border-0">
		<div class="card-body">
			<form [formGroup]="form" (ngSubmit)="save()">
				
				<div class="row g-3">
					<div class="col-12 col-md-4">
						<label class="form-label">Code</label>
						<input class="form-control" formControlName="code"
						[class.is-invalid]="form.get('code')?.touched && form.get('code')?.invalid">
						<div class="invalid-feedback">Code is required.</div>
					</div>
					
					<div class="col-12 col-md-8">
						<label class="form-label">Name</label>
						<input class="form-control" formControlName="name"
						[class.is-invalid]="form.get('name')?.touched && form.get('name')?.invalid">
						<div class="invalid-feedback">Name is required.</div>
					</div>
					
					<div class="col-12 col-md-4">
						<label class="form-label">Sort Order</label>
						<input type="number" class="form-control" formControlName="sort_order">
						<div class="form-text text-muted">Lower number = higher priority ordering in lists.</div>
					</div>
					
					<div class="col-12 col-md-8 d-flex align-items-end">
						<div class="form-check">
							<input class="form-check-input" type="checkbox" formControlName="is_active" id="isActive">
							<label class="form-check-label" for="isActive">Active</label>
						</div>
					</div>
				</div>
				
				<div class="d-flex gap-2 justify-content-end mt-4">
					<button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="saving">
						Cancel
					</button>
					<button type="submit" class="btn btn-primary" [disabled]="saving">
						<span *ngIf="!saving">{{ isCreate ? 'Create Priority' : 'Save Changes' }}</span>
						<span *ngIf="saving">Saving…</span>
					</button>
				</div>
				
			</form>
		</div>
	</div>
</div>
